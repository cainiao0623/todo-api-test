name: 接口自动化测试

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  run-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4
      
      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install fastapi uvicorn pytest requests pytest-html
      
      - name: 启动FastAPI服务
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
      
      - name: 执行自动化测试
        run: |
          pytest tests/ --html=reports/report.html --self-contained-html
      
      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: reports/report.html
